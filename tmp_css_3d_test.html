<html>
<head>
<style>
body { margin: 0; background: #222; overflow: hidden; color: white; }
#vt3d-scene-wrapper {
    width: 100vw; height: 100vh;
    perspective: 600px;
    display: flex; align-items: center; justify-content: center;
}
#vt3d-scene {
    width: 600px; height: 600px;
    position: relative;
    transform-style: preserve-3d;
    transform: translateZ(600px); /* Move scene center to camera */
}
.room3d-face {
    position: absolute;
    left: 50%; top: 50%;
    width: 600px; height: 600px;
    border: 2px solid red;
    font-size: 100px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.1);
}
#front  { transform: translate(-50%, -50%) translateZ(300px); }         /* Z=+300 */
#back   { transform: translate(-50%, -50%) rotateY(180deg) translateZ(300px); } /* Z=-300 */
#left   { transform: translate(-50%, -50%) rotateY(-90deg) translateZ(300px); }
#right  { transform: translate(-50%, -50%) rotateY(90deg) translateZ(300px); }

</style>
</head>
<body>
    <div id="vt3d-scene-wrapper">
        <div id="vt3d-scene">
            <div id="front" class="room3d-face">FRONT</div>
            <div id="back" class="room3d-face">BACK</div>
            <div id="left" class="room3d-face">LEFT</div>
            <div id="right" class="room3d-face">RIGHT</div>
        </div>
    </div>
    <script>
        let rY = 0;
        document.addEventListener('mousemove', e => {
            rY = (e.clientX / window.innerWidth - 0.5) * 360;
            document.getElementById('vt3d-scene').style.transform = `translateZ(600px) rotateY(${rY}deg)`;
        });
    </script>
</body>
</html>
